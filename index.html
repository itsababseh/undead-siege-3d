<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>UNDEAD SIEGE 3D</title>
<style>
body { margin: 0; padding: 0; background: #111; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
#menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 1000; }
#menu h1 { color: #c00; font-size: 3em; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
#menu button { background: none; border: 2px solid #c00; color: #c00; padding: 15px 40px; font: bold 18px 'Courier New'; cursor: pointer; margin: 20px; transition: all 0.3s; }
#menu button:hover { background: #c00; color: white; }
canvas { display: block; }
#game { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="menu">
  <h1>UNDEAD SIEGE</h1>
  <p>3D ZOMBIE SURVIVAL</p>
  <button onclick="startGame()">ENLIST</button>
  <p style="font-size: 12px; margin-top: 20px;">Loading modular system...</p>
</div>

<div id="game" class="hidden"></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

let gameStarted = false;

window.startGame = function() {
  if (gameStarted) return;
  gameStarted = true;
  
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  
  // Simple Three.js scene to verify it works
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111118);
  
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.6, 5);
  
  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('game').appendChild(renderer.domElement);
  
  // Add a simple cube to show it's working
  const geometry = new THREE.BoxGeometry(1, 1, 1);
  const material = new THREE.MeshBasicMaterial({ color: 0xc00000 });
  const cube = new THREE.Mesh(geometry, material);
  scene.add(cube);
  
  // Add some text
  const loader = new THREE.FontLoader();
  
  function animate() {
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();
  
  // Show success message
  setTimeout(() => {
    const div = document.createElement('div');
    div.style.cssText = 'position:fixed;top:20px;left:20px;color:#0f0;font-family:Courier New;font-size:14px;z-index:2000;background:rgba(0,0,0,0.8);padding:10px;border:1px solid #0f0;';
    div.innerHTML = '✅ THREE.JS WORKING<br>✅ ES MODULES WORKING<br>✅ Basic game engine ready<br><br>The modular system is functional!<br>Portal door features can be added back.';
    document.body.appendChild(div);
  }, 1000);
};

console.log('✅ Script loaded successfully');
</script>

</body>
</html>
